<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gate Scanner – RKMVP Reunion 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ── PASTE YOUR FIREBASE CONFIG HERE ──
const firebaseConfig = {
    apiKey: "AIzaSyAAW9zZmE1cEUUWLEwT1hWtY1fQoiGt_No",
    authDomain: "rkmvp-reunion-2026.firebaseapp.com",
    projectId: "rkmvp-reunion-2026",
    storageBucket: "rkmvp-reunion-2026.firebasestorage.app",
    messagingSenderId: "552260116936",
    appId: "1:552260116936:web:5d731a1fa2746ad149e0fd"
  };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    window._db=db; window._auth=auth;
    window._doc=doc; window._getDoc=getDoc; window._updateDoc=updateDoc;
    window._signIn=signInWithEmailAndPassword;
    window._signOut=signOut;
    window._firebaseReady=true;

    onAuthStateChanged(auth, user => {
      if (user) showScanner(user.email);
      else showLogin();
    });
  </script>

  <style>
    :root{--saffron:#E8560A;--gold:#FFD700;--deep-blue:#0D2B5E;--light-blue:#1A4A9E;--cream:#FDF6E3;--white:#FFFFFF;--red:#CC0000;--success:#1A7A3C;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:30px;}
    header{background:linear-gradient(135deg,var(--deep-blue),var(--light-blue));padding:16px 18px;text-align:center;border-bottom:4px solid var(--gold);}
    header h1{font-family:'Cinzel',serif;color:var(--white);font-size:clamp(1.1rem,5vw,1.5rem);letter-spacing:0.04em;}
    header .subtitle{color:var(--gold);font-family:'Cinzel',serif;font-size:0.82rem;margin-top:4px;letter-spacing:0.06em;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#E8F0FE;border-bottom:1px solid #C5D3E8;}
    .top-bar span{font-size:0.78rem;color:var(--deep-blue);font-weight:700;}
    .btn-sm{padding:6px 14px;border:none;border-radius:6px;font-size:0.78rem;font-weight:700;cursor:pointer;}
    .btn-logout{background:var(--red);color:white;}

    /* LOGIN */
    .login-card{background:var(--white);margin:30px 14px;border-radius:14px;border:1.5px solid #FFD70044;box-shadow:0 4px 24px #0D2B5E18;overflow:hidden;}
    .card-header{background:linear-gradient(90deg,var(--deep-blue),var(--light-blue));padding:12px 18px;}
    .card-header h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:0.05em;}
    .card-body{padding:22px 18px;}
    label{display:block;font-weight:700;color:var(--deep-blue);font-size:0.85rem;margin-bottom:5px;}
    input{width:100%;padding:11px 13px;border:1.8px solid #C5D3E8;border-radius:8px;font-size:0.95rem;font-family:'Lato',sans-serif;background:#F7FAFF;margin-bottom:14px;-webkit-appearance:none;}
    input:focus{outline:none;border-color:var(--light-blue);}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--saffron),#C9400A);color:var(--white);font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.06em;border:none;border-radius:10px;cursor:pointer;}
    .btn-main:disabled{opacity:0.6;cursor:not-allowed;}
    .err-msg{color:var(--red);font-size:0.82rem;margin-bottom:10px;display:none;font-weight:700;}
    .spinner{display:inline-block;width:16px;height:16px;border:3px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* SCANNER */
    #scanner-section{display:none;}
    .scan-card{background:var(--white);margin:14px 14px 0;border-radius:14px;border:1.5px solid #FFD70044;box-shadow:0 4px 24px #0D2B5E18;overflow:hidden;}
    #reader{width:100%;}
    .scan-note{text-align:center;padding:12px;font-size:0.84rem;color:#555;background:#F7FAFF;border-top:1px solid #eee;}
    .scan-stats{display:flex;gap:10px;padding:10px 14px 0;}
    .scan-stat{flex:1;background:var(--white);border-radius:8px;border:1.5px solid #FFD70044;padding:10px;text-align:center;}
    .scan-stat-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;color:var(--deep-blue);}
    .scan-stat-label{font-size:0.7rem;color:#777;margin-top:2px;}

    /* RESULT OVERLAY — full screen */
    #result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
    #result-overlay.active{display:flex;}
    #result-overlay.green{background:var(--success);}
    #result-overlay.red{background:var(--red);}
    #result-overlay.warning{background:#856404;}
    .result-icon{font-size:5rem;margin-bottom:12px;animation:pop 0.3s ease;}
    @keyframes pop{from{transform:scale(0.4);}to{transform:scale(1);}}
    .result-status{font-family:'Cinzel',serif;font-size:clamp(2.2rem,11vw,3.5rem);font-weight:900;color:white;letter-spacing:0.06em;margin-bottom:8px;}
    .result-name{font-size:1.1rem;color:rgba(255,255,255,0.95);font-weight:700;margin-bottom:4px;}
    .result-detail{font-size:0.9rem;color:rgba(255,255,255,0.85);line-height:1.7;margin-bottom:18px;white-space:pre-line;}

    /* COUNTER */
    .counter-section{margin-bottom:18px;}
    .counter-label{font-size:0.85rem;color:rgba(255,255,255,0.85);margin-bottom:10px;}
    .counter-row{display:flex;align-items:center;justify-content:center;gap:18px;}
    .cnt-btn{width:50px;height:50px;border-radius:50%;border:3px solid white;background:transparent;color:white;font-size:1.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
    .cnt-btn:active{background:rgba(255,255,255,0.2);}
    .cnt-num{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;color:white;min-width:50px;}

    /* ACTION BUTTONS */
    .result-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;}
    .btn-confirm{padding:14px;background:white;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;}
    #result-overlay.green .btn-confirm{color:var(--success);}
    #result-overlay.red   .btn-confirm{color:var(--red);}
    #result-overlay.warning .btn-confirm{color:#856404;}
    .btn-cancel{padding:12px;background:transparent;border:2px solid white;border-radius:10px;font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;cursor:pointer;color:white;letter-spacing:0.04em;}
  </style>
</head>
<body>

<header>
  <h1>RKMVP Alumni Association</h1>
  <div class="subtitle">Gate Scanner – Reunion 2026</div>
</header>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-card">
    <div class="card-header"><h2>Attendant Login</h2></div>
    <div class="card-body">
      <div class="err-msg" id="login-err">❌ Invalid email or password.</div>
      <label>Email</label>
      <input type="email" id="att-email" placeholder="attendant@email.com" autocomplete="email"/>
      <label>Password</label>
      <input type="password" id="att-pass" placeholder="Password" autocomplete="current-password"/>
      <button class="btn-main" id="btn-login" onclick="attLogin()">LOGIN</button>
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="scanner-section">
  <div class="top-bar">
    <span id="att-email-display">Attendant</span>
    <button class="btn-sm btn-logout" onclick="attLogout()">LOGOUT</button>
  </div>
  <div class="scan-stats">
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-ok">0</div><div class="scan-stat-label">Allowed Today</div></div>
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-fail">0</div><div class="scan-stat-label">Rejected Today</div></div>
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-total">0</div><div class="scan-stat-label">Total Scans</div></div>
  </div>
  <div class="scan-card">
    <div id="reader"></div>
    <div class="scan-note">📷 Point camera at guest's meal QR code</div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div id="result-overlay">
  <div class="result-icon"  id="result-icon"></div>
  <div class="result-status" id="result-status"></div>
  <div class="result-name"   id="result-name"></div>
  <div class="result-detail" id="result-detail"></div>
  <div class="counter-section" id="counter-section" style="display:none;">
    <div class="counter-label">How many people entering?</div>
    <div class="counter-row">
      <button class="cnt-btn" onclick="changeCount(-1)">−</button>
      <div class="cnt-num" id="cnt-display">1</div>
      <button class="cnt-btn" onclick="changeCount(1)">+</button>
    </div>
  </div>
  <div class="result-actions">
    <button class="btn-confirm" id="btn-confirm" onclick="confirmEntry()">✅ CONFIRM ENTRY</button>
    <button class="btn-cancel"  onclick="dismissResult()">CANCEL / NEXT SCAN</button>
  </div>
</div>

<script>
  // ============================================================
  // ⚙️  EVENT CONFIGURATION — CHANGE THESE FOR YOUR EVENT
  // ============================================================
  const EVENT_CONFIG = {
    DAY1_DATE: '2026-05-18',   // ← CHANGE THIS: First day of event
    DAY2_DATE: '2026-05-19',   // ← CHANGE THIS: Second day of event
  };
  // ============================================================

  let scanner      = null;
  let pendingEntry = null;
  let entryCount   = 1;
  let maxCount     = 1;
  let scanOk   = parseInt(localStorage.getItem('scanOk'))  || 0;
  let scanFail = parseInt(localStorage.getItem('scanFail')) || 0;

function updateScanStats() {
  localStorage.setItem('scanOk',   scanOk);
  localStorage.setItem('scanFail', scanFail);
  document.getElementById('scan-count-ok').textContent    = scanOk;
  document.getElementById('scan-count-fail').textContent  = scanFail;
  document.getElementById('scan-count-total').textContent = scanOk + scanFail;
}

  // ── AUTH ──
  function attLogin() {
    const email = document.getElementById('att-email').value.trim();
    const pass  = document.getElementById('att-pass').value.trim();
    const btn   = document.getElementById('btn-login');
    const err   = document.getElementById('login-err');
    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    window._signIn(window._auth, email, pass).catch(() => {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'LOGIN';
    });
  }

function attLogout() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner = null;
      window._signOut(window._auth);
    }).catch(() => {
      scanner = null;
      window._signOut(window._auth);
    });
  } else {
    window._signOut(window._auth);
  }
}

function showLogin() {
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('dashboard-section').style.display = 'none';
  // Reset login button
  const btn = document.getElementById('btn-login');
  btn.disabled = false;
  btn.textContent = 'LOGIN';
  // Clear fields
  document.getElementById('admin-email').value = '';
  document.getElementById('admin-pass').value = '';
  document.getElementById('login-err').style.display = 'none';
}

function showScanner(email) {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('scanner-section').style.display = 'block';
  document.getElementById('att-email-display').textContent = email;
  updateScanStats();
  startScanner();
}

  function startScanner() {
    if (scanner) return;
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    ).catch(() => {
      document.querySelector('.scan-note').textContent = '⚠️ Camera access denied. Please allow camera and reload.';
    });
  }

  function getEventDay() {
    const today = new Date().toISOString().split('T')[0];
    if (today === EVENT_CONFIG.DAY1_DATE) return 1;
    if (today === EVENT_CONFIG.DAY2_DATE) return 2;
    return null;
  }

  // ── SCAN SUCCESS ──
  async function onScanSuccess(rawText) {
    if (!window._firebaseReady || pendingEntry) return;
    if (scanner) scanner.pause();

    let data;
    try { data = JSON.parse(rawText); }
    catch {
      scanFail++; updateScanStats();
      showResult('red','❌','INVALID QR','This QR code is not recognized.','',null);
      return;
    }

    const { guestId, meal, day, total, name } = data;
    if (!guestId || !meal || !day) {
      scanFail++; updateScanStats();
      showResult('red','❌','INVALID QR','Unrecognized QR format.','',null);
      return;
    }

    // Check event day matches
    const eventDay = getEventDay();
    if (!eventDay) {
      scanFail++; updateScanStats();
      showResult('warning','⚠️','WRONG DAY',`Today is not an event day.\nEvent: ${EVENT_CONFIG.DAY1_DATE} & ${EVENT_CONFIG.DAY2_DATE}`,'',null);
      return;
    }
    if (parseInt(day) !== eventDay) {
      scanFail++; updateScanStats();
      showResult('warning','⚠️','WRONG DAY QR',`This QR is for Day ${day}.\nToday is Day ${eventDay}.`,name||'',null);
      return;
    }

    try {
      const ref  = window._doc(window._db,'guests',guestId);
      const snap = await window._getDoc(ref);

      if (!snap.exists()) {
        scanFail++; updateScanStats();
        showResult('red','❌','NOT FOUND','Guest not found in database.',name||'',null);
        return;
      }

      const g       = snap.data();
      if (!g.approved) {
        scanFail++; updateScanStats();
        showResult('warning','⚠️','NOT APPROVED','This guest has not been approved yet.',g.name,null);
        return;
      }

      const dayKey    = `day${day}`;
      const used      = (g.meals && g.meals[dayKey] && g.meals[dayKey][meal]) || 0;
      const allowed   = total || ((g.familyCount||0)+1);
      const remaining = allowed - used;

      if (remaining <= 0) {
        scanFail++; updateScanStats();
        showResult('red','❌','LIMIT REACHED',
          `${meal.toUpperCase()} – Day ${day}\nAll ${allowed} entries used.\nNo more entries allowed.`,
          g.name, null);
        return;
      }

      // ✅ OK — show green with counter
      pendingEntry = { ref, dayKey, meal, used, allowed };
      entryCount   = 1;
      maxCount     = remaining;
      showResult('green','✅','ALLOWED',
        `${meal.toUpperCase()} – Day ${day}\nUsed: ${used} / ${allowed}\nRemaining: ${remaining}`,
        g.name, remaining);

    } catch(e) {
      console.error(e);
      scanFail++; updateScanStats();
      showResult('red','❌','ERROR','Database error. Please try again.','',null);
    }
  }

  function showResult(color, icon, status, detail, name, remaining) {
    const overlay = document.getElementById('result-overlay');
    overlay.className = `active ${color}`;
    document.getElementById('result-icon').textContent   = icon;
    document.getElementById('result-status').textContent = status;
    document.getElementById('result-name').textContent   = name;
    document.getElementById('result-detail').textContent = detail;

    const counterSec = document.getElementById('counter-section');
    const confirmBtn = document.getElementById('btn-confirm');

    if (color === 'green' && remaining && remaining > 0) {
      counterSec.style.display = 'block';
      entryCount = 1;
      document.getElementById('cnt-display').textContent = entryCount;
      confirmBtn.style.display = 'block';
    } else {
      counterSec.style.display = 'none';
      confirmBtn.style.display = color === 'green' ? 'block' : 'none';
    }
  }

  function changeCount(delta) {
    entryCount = Math.max(1, Math.min(maxCount, entryCount + delta));
    document.getElementById('cnt-display').textContent = entryCount;
  }

  async function confirmEntry() {
    if (!pendingEntry) { dismissResult(); return; }
    const { ref, dayKey, meal, used, allowed } = pendingEntry;
    const newUsed = Math.min(used + entryCount, allowed);
    try {
      await window._updateDoc(ref, { [`meals.${dayKey}.${meal}`]: newUsed });
      scanOk += entryCount; updateScanStats();
    } catch(e) { console.error(e); }
    pendingEntry = null;
    dismissResult();
  }

  function dismissResult() {
    document.getElementById('result-overlay').className = '';
    pendingEntry = null;
    if (scanner) {
      try { scanner.resume(); }
      catch { startScanner(); }
    }
  }

  // Keyboard shortcut — spacebar to dismiss
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && document.getElementById('result-overlay').classList.contains('active')) {
      e.preventDefault();
      dismissResult();
    }
  });
</script>
</body>
</html>
