<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gate Scanner – RKMVP Reunion 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    // ── PASTE YOUR FIREBASE CONFIG HERE ──
  const firebaseConfig = {
    apiKey: "AIzaSyAAW9zZmE1cEUUWLEwT1hWtY1fQoiGt_No",
    authDomain: "rkmvp-reunion-2026.firebaseapp.com",
    projectId: "rkmvp-reunion-2026",
    storageBucket: "rkmvp-reunion-2026.firebasestorage.app",
    messagingSenderId: "552260116936",
    appId: "1:552260116936:web:5d731a1fa2746ad149e0fd"
  };;
    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    window._db=db; window._auth=auth;
    window._doc=doc; window._getDoc=getDoc; window._updateDoc=updateDoc;
    window._signIn=signInWithEmailAndPassword;
    window._signOut=signOut;
    window._firebaseReady=true;
    onAuthStateChanged(auth, user => {
      if (user) showScanner(user.email);
      else showLogin();
    });
  </script>

  <style>
    :root{--saffron:#E8560A;--gold:#FFD700;--deep-blue:#0D2B5E;--light-blue:#1A4A9E;--cream:#FDF6E3;--white:#FFFFFF;--red:#CC0000;--success:#1A7A3C;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:30px;}
    header{background:linear-gradient(135deg,var(--deep-blue),var(--light-blue));padding:16px 18px;text-align:center;border-bottom:4px solid var(--gold);}
    header h1{font-family:'Cinzel',serif;color:var(--white);font-size:clamp(1.1rem,5vw,1.5rem);letter-spacing:0.04em;}
    header .subtitle{color:var(--gold);font-family:'Cinzel',serif;font-size:0.82rem;margin-top:4px;letter-spacing:0.06em;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#E8F0FE;border-bottom:1px solid #C5D3E8;}
    .top-bar span{font-size:0.78rem;color:var(--deep-blue);font-weight:700;}
    .btn-sm{padding:6px 14px;border:none;border-radius:6px;font-size:0.78rem;font-weight:700;cursor:pointer;}
    .btn-logout{background:var(--red);color:white;}
    .login-card{background:var(--white);margin:30px 14px;border-radius:14px;border:1.5px solid #FFD70044;box-shadow:0 4px 24px #0D2B5E18;overflow:hidden;}
    .card-header{background:linear-gradient(90deg,var(--deep-blue),var(--light-blue));padding:12px 18px;}
    .card-header h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:0.05em;}
    .card-body{padding:22px 18px;}
    label{display:block;font-weight:700;color:var(--deep-blue);font-size:0.95rem;margin-bottom:5px;}
    input{width:100%;padding:12px 13px;border:1.8px solid #C5D3E8;border-radius:8px;font-size:1rem;font-family:'Lato',sans-serif;background:#F7FAFF;margin-bottom:14px;-webkit-appearance:none;}
    input:focus{outline:none;border-color:var(--light-blue);}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--saffron),#C9400A);color:var(--white);font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.06em;border:none;border-radius:10px;cursor:pointer;}
    .btn-main:disabled{opacity:0.6;cursor:not-allowed;}
    .err-msg{color:var(--red);font-size:0.88rem;margin-bottom:10px;display:none;font-weight:700;}
    .spinner{display:inline-block;width:16px;height:16px;border:3px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
#scanner-section{display:none;height:100vh;display:none;flex-direction:column;}
.scanner-wrap{height:70vh;overflow:hidden;position:relative;}
.manual-wrap{height:30vh;background:var(--deep-blue);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px;}
.manual-title{font-family:'Cinzel',serif;color:var(--gold);font-size:0.9rem;letter-spacing:0.05em;}
.manual-counter-row{display:flex;align-items:center;gap:20px;}
.manual-btn{width:56px;height:56px;border-radius:50%;border:3px solid white;background:transparent;color:white;font-size:2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.manual-btn:active{background:rgba(255,255,255,0.2);}
.manual-num{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:900;color:white;min-width:50px;text-align:center;}
.manual-allow{padding:10px 32px;background:var(--success);color:white;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:0.05em;}
.manual-allow:active{opacity:0.85;}
.manual-meal{font-size:0.78rem;color:#B8CFFF;font-weight:700;}
    .scan-stats{display:flex;gap:10px;padding:10px 14px 0;}
    .scan-stat{flex:1;background:var(--white);border-radius:8px;border:1.5px solid #FFD70044;padding:10px;text-align:center;}
    .scan-stat-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;color:var(--deep-blue);}
    .scan-stat-label{font-size:0.7rem;color:#777;margin-top:2px;}
    .scan-card{background:var(--white);margin:14px 14px 0;border-radius:14px;border:1.5px solid #FFD70044;box-shadow:0 4px 24px #0D2B5E18;overflow:hidden;}
    #reader{width:100%;}
    .scan-note{text-align:center;padding:12px;font-size:0.88rem;color:#555;background:#F7FAFF;border-top:1px solid #eee;}
    /* Event day info */
    .day-info{margin:10px 14px 0;background:var(--white);border-radius:8px;border:1.5px solid #FFD70044;padding:10px 14px;font-size:0.82rem;color:var(--deep-blue);font-weight:700;text-align:center;}
    /* RESULT OVERLAY */
    #result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
    #result-overlay.active{display:flex;}
    #result-overlay.green{background:var(--success);}
    #result-overlay.red{background:var(--red);}
    #result-overlay.warning{background:#856404;}
    .result-icon{font-size:5rem;margin-bottom:12px;animation:pop 0.3s ease;}
    @keyframes pop{from{transform:scale(0.4);}to{transform:scale(1);}}
    .result-status{font-family:'Cinzel',serif;font-size:clamp(2.2rem,11vw,3.5rem);font-weight:900;color:white;letter-spacing:0.06em;margin-bottom:8px;}
    .result-name{font-size:1.1rem;color:rgba(255,255,255,0.95);font-weight:700;margin-bottom:4px;}
    .result-detail{font-size:0.95rem;color:rgba(255,255,255,0.85);line-height:1.7;margin-bottom:18px;white-space:pre-line;}
    .counter-section{margin-bottom:18px;}
    .counter-label{font-size:0.9rem;color:rgba(255,255,255,0.85);margin-bottom:10px;}
    .counter-row{display:flex;align-items:center;justify-content:center;gap:18px;}
    .cnt-btn{width:50px;height:50px;border-radius:50%;border:3px solid white;background:transparent;color:white;font-size:1.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .cnt-btn:active{background:rgba(255,255,255,0.2);}
    .cnt-num{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;color:white;min-width:50px;}
    .result-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;}
    .btn-confirm{padding:14px;background:white;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;}
    #result-overlay.green .btn-confirm{color:var(--success);}
    #result-overlay.red   .btn-confirm{color:var(--red);}
    #result-overlay.warning .btn-confirm{color:#856404;}
    .btn-cancel{padding:12px;background:transparent;border:2px solid white;border-radius:10px;font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;cursor:pointer;color:white;letter-spacing:0.04em;}
  </style>
</head>
<body>

<header>
  <h1>RKMVP Alumni Association</h1>
  <div class="subtitle">Gate Scanner – Reunion 2026</div>
</header>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-card">
    <div class="card-header"><h2>Attendant Login</h2></div>
    <div class="card-body">
      <div class="err-msg" id="login-err">❌ Invalid email or password.</div>
      <label>Email</label>
      <input type="email" id="att-email" placeholder="attendant@email.com" autocomplete="email"/>
      <label>Password</label>
      <input type="password" id="att-pass" placeholder="Password" autocomplete="current-password"/>
      <button class="btn-main" id="btn-login" onclick="attLogin()">LOGIN</button>
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="scanner-section">
  <div class="top-bar">
    <span></span>
    <button class="btn-sm btn-logout" onclick="attLogout()">LOGOUT</button>
  </div>
  <div class="day-info" id="day-info">Loading event day info...</div>
  <div class="scan-stats">
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-ok">0</div><div class="scan-stat-label">Allowed</div></div>
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-fail">0</div><div class="scan-stat-label">Invalid</div></div>
    <div class="scan-stat"><div class="scan-stat-num" id="scan-count-total">0</div><div class="scan-stat-label">Total</div></div>
  </div>
  <div class="scanner-wrap">
    <div id="reader"></div>
  </div>
  <div class="manual-wrap">
    <div class="manual-title">Manual Entry</div>
    <div class="manual-meal" id="manual-meal-label">Detecting meal time...</div>
    <div class="manual-counter-row">
      <button class="manual-btn" onclick="manualChange(-1)">−</button>
      <div class="manual-num" id="manual-num">0</div>
      <button class="manual-btn" onclick="manualChange(1)">+</button>
    </div>
    <button class="manual-allow" onclick="manualAllow()">ALLOW</button>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div id="result-overlay">
  <div class="result-icon"   id="result-icon"></div>
  <div class="result-status" id="result-status"></div>
  <div class="result-name"   id="result-name"></div>
  <div class="result-detail" id="result-detail"></div>
  <div class="counter-section" id="counter-section" style="display:none;">
    <div class="counter-label">How many people entering?</div>
    <div class="counter-row">
      <button class="cnt-btn" onclick="changeCount(-1)">−</button>
      <div class="cnt-num" id="cnt-display">1</div>
      <button class="cnt-btn" onclick="changeCount(1)">+</button>
    </div>
  </div>
  <div class="result-actions">
    <button class="btn-confirm" id="btn-confirm" onclick="confirmEntry()">✅ CONFIRM ENTRY</button>
    <button class="btn-cancel"  onclick="dismissResult()">CANCEL / NEXT SCAN</button>
  </div>
</div>

<script>
  // ============================================================
  // ⚙️ EVENT CONFIGURATION — CHANGE THESE FOR YOUR EVENT
  // ============================================================
  const EVENT_START_DATE = '2026-05-19'; // ← CHANGE THIS
  const EVENT_END_DATE   = '2026-05-20'; // ← CHANGE THIS
  // ============================================================

  function getEventDays() {
    const days = [];
    let current = new Date(EVENT_START_DATE);
    const end   = new Date(EVENT_END_DATE);
    let dayNum  = 1;
    while (current <= end) {
      days.push({
        num:   dayNum,
        date:  current.toISOString().split('T')[0],
        label: `Day ${dayNum} — ${current.toLocaleDateString('en-IN',{day:'numeric',month:'long'})}`
      });
      current.setDate(current.getDate()+1);
      dayNum++;
    }
    return days;
  }

  function getEventDay() {
    const today = new Date().toISOString().split('T')[0];
    return getEventDays().find(d => d.date === today) || null;
  }

  let scanner      = null;
  let pendingEntry = null;
  let entryCount   = 1;
  let maxCount     = 1;
  let scanOk       = parseInt(localStorage.getItem('scanOk'))   || 0;
  let scanFail     = parseInt(localStorage.getItem('scanFail')) || 0;

  function updateScanStats() {
    localStorage.setItem('scanOk',   scanOk);
    localStorage.setItem('scanFail', scanFail);
    document.getElementById('scan-count-ok').textContent    = scanOk;
    document.getElementById('scan-count-fail').textContent  = scanFail;
    document.getElementById('scan-count-total').textContent = scanOk + scanFail;
  }

  function attLogin() {
    const email = document.getElementById('att-email').value.trim();
    const pass  = document.getElementById('att-pass').value.trim();
    const btn   = document.getElementById('btn-login');
    const err   = document.getElementById('login-err');
    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    window._signIn(window._auth, email, pass).catch(() => {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'LOGIN';
    });
  }

  function attLogout() {
    if (scanner) {
      scanner.stop().then(() => {
        scanner = null;
        window._signOut(window._auth);
      }).catch(() => {
        scanner = null;
        window._signOut(window._auth);
      });
    } else {
      window._signOut(window._auth);
    }
  }

  function showLogin() {
    document.getElementById('login-section').style.display  = 'block';
    document.getElementById('scanner-section').style.display = 'none';
    const btn = document.getElementById('btn-login');
    btn.disabled = false; btn.textContent = 'LOGIN';
    document.getElementById('att-email').value = '';
    document.getElementById('att-pass').value  = '';
    document.getElementById('login-err').style.display = 'none';
  }

  function showScanner(email) {
    document.getElementById('login-section').style.display  = 'none';
    document.getElementById('scanner-section').style.display = 'block';
    document.getElementById('att-email-display').textContent = email;

    // Show event day info
    const eventDay = getEventDay();
    const dayInfoEl = document.getElementById('day-info');
    if (eventDay) {
      dayInfoEl.textContent = `📅 Today: ${eventDay.label}`;
      dayInfoEl.style.color = 'var(--success)';
    } else {
      const today = new Date().toISOString().split('T')[0];
      const start = EVENT_START_DATE;
      if (today < start) {
        dayInfoEl.textContent = `⏳ Event starts on ${new Date(EVENT_START_DATE).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`;
      } else {
        dayInfoEl.textContent = `ℹ️ Event has ended. Scanning disabled.`;
      }
      dayInfoEl.style.color = 'var(--red)';
    }

updateScanStats();
    updateManualMealLabel();
    setInterval(updateManualMealLabel, 60000);
    startScanner();
  }

  function startScanner() {
    if (scanner) return;
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    ).catch(() => {
      document.querySelector('.scan-note').textContent = '⚠️ Camera access denied. Please allow camera and reload.';
    });
  }

  async function onScanSuccess(rawText) {
    if (!window._firebaseReady || pendingEntry) return;
    if (scanner) scanner.pause();

    let data;
    try { data = JSON.parse(rawText); }
    catch {
      scanFail++; updateScanStats();
      showResult('red','❌','Invalid QR','This QR code is not recognized.','');
      return;
    }

    const { guestId, meal, day, total, name } = data;
    if (!guestId || !meal || !day) {
      scanFail++; updateScanStats();
      showResult('red','❌','Invalid QR','Unrecognized QR format.','');
      return;
    }

    // Check event day
    const eventDay = getEventDay();
    if (!eventDay) {
      scanFail++; updateScanStats();
      showResult('warning','⚠️','Invalid QR',
        `Today is not an event day.`,
        name||'');
      return;
    }

    if (parseInt(day) !== eventDay.num) {
      scanFail++; updateScanStats();
      showResult('warning','⚠️','Invalid QR',
        `This QR is for Day ${day}.\nToday is ${eventDay.label}.`,
        name||'');
      return;
    }

    try {
      const ref  = window._doc(window._db,'guests',guestId);
      const snap = await window._getDoc(ref);

      if (!snap.exists()) {
        scanFail++; updateScanStats();
        showResult('red','❌','Invalid QR','Guest not found in database.',name||'');
        return;
      }

      const g       = snap.data();
      if (!g.approved) {
        scanFail++; updateScanStats();
        showResult('warning','⚠️','Invalid QR','This guest has not been approved yet.',g.name);
        return;
      }

      const dayKey    = `day${day}`;
      const used      = (g.meals && g.meals[dayKey] && g.meals[dayKey][meal]) || 0;
      const allowed   = total || ((g.familyCount||0)+1);
      const remaining = allowed - used;

if (remaining <= 0) {
        scanFail++; updateScanStats();
        showResult('red','❌','Invalid QR',
          `${meal.toUpperCase()} — ${eventDay.label}\nAll ${allowed} entries used.`,
          g.name);
        return;
      }

      // AUTO CONFIRM instantly
      const newUsed = used + 1;
      await window._updateDoc(ref, { [`meals.${dayKey}.${meal}`]: newUsed });
      scanOk++; updateScanStats();
      showResult('green','✅','ALLOWED',
        `${meal.toUpperCase()} — ${eventDay.label}\nEntry ${newUsed} of ${allowed}`,
        g.name);
      setTimeout(() => dismissResult(), 500);
      pendingEntry = null;
      return;

    } catch(e) {
      console.error(e);
      scanFail++; updateScanStats();
      showResult('red','❌','Invalid QR','Database error. Please try again.','');
    }
  }

  function getCurrentMeal() {
    const h = new Date().getHours();
    if (h >= 7  && h < 11) return 'breakfast';
    if (h >= 12 && h < 16) return 'lunch';
    if (h >= 18 && h < 23) return 'dinner';
    return null;
  }

  function updateManualMealLabel() {
    const meal = getCurrentMeal();
    const el   = document.getElementById('manual-meal-label');
    if (meal) {
      el.textContent = `Current meal: ${meal.charAt(0).toUpperCase()+meal.slice(1)}`;
      el.style.color = '#B8CFFF';
    } else {
      el.textContent = 'No active meal time';
      el.style.color = '#FF8888';
    }
  }

  let manualCount = 0;
  function manualChange(delta) {
    manualCount = Math.max(0, manualCount + delta);
    document.getElementById('manual-num').textContent = manualCount;
  }

  async function manualAllow() {
    if (manualCount === 0) return;
    const eventDay = getEventDay();
    const meal     = getCurrentMeal();
    if (!eventDay || !meal) { alert('No active event day or meal time.'); return; }
    const dayKey   = `day${eventDay.num}`;
    try {
      const metaRef  = window._doc(window._db, 'manualEntries', dayKey);
      const metaSnap = await window._getDoc(metaRef);
      const existing = metaSnap.exists() ? (metaSnap.data()[meal] || 0) : 0;
      await window._updateDoc(metaRef, { [meal]: existing + manualCount })
        .catch(async () => {
          const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          await setDoc(metaRef, { [meal]: existing + manualCount }, { merge: true });
        });
      scanOk += manualCount; updateScanStats();
      manualCount = 0;
      document.getElementById('manual-num').textContent = 0;
    } catch(e) { console.error(e); alert('Error saving. Try again.'); }
  }

  function showResult(color, icon, status, detail, name) {
    const overlay = document.getElementById('result-overlay');
    overlay.className = `active ${color}`;
    document.getElementById('result-icon').textContent   = icon;
    document.getElementById('result-status').textContent = status;
    document.getElementById('result-name').textContent   = name;
    document.getElementById('result-detail').textContent = detail;
    document.getElementById('counter-section').style.display = 'none';
    document.getElementById('btn-confirm').style.display     = 'none';
  }

  async function confirmEntry() {
    if (!pendingEntry) { dismissResult(); return; }
    const { ref, dayKey, meal, used, allowed } = pendingEntry;
    const newUsed = Math.min(used + 1, allowed);
    try {
      await window._updateDoc(ref, { [`meals.${dayKey}.${meal}`]: newUsed });
      scanOk++; updateScanStats();
    } catch(e) { console.error(e); }
    pendingEntry = null;
    dismissResult();
  }

  function dismissResult() {
    document.getElementById('result-overlay').className = '';
    pendingEntry = null;
    if (scanner) {
      try { scanner.resume(); }
      catch { startScanner(); }
    }
  }

  document.addEventListener('keydown', e => {
    if (e.code==='Space' && document.getElementById('result-overlay').classList.contains('active')) {
      e.preventDefault();
      dismissResult();
    }
  });

  window.addEventListener('load', () => {
    document.getElementById('att-pass').addEventListener('keydown', e => {
      if (e.key==='Enter') attLogin();
    });
  });
</script>
</body>
</html>
